<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Data Types - Different Types of Data

        //STRING - text in quotes for ex- "William"  or 'william'

        const username = "John"
        const city = "LA"
        const message = "Hello Willia"

        //Number - ANY Number(+ve , -ve , decimal )
        const age = 39
        const price = 99.99
        const negative = -10


        //Boolean - true or false

        const isLoggedIn = true
        const NetflixSub = false


        //Null-Intentionally Empty

        const x = null;

        //Undefined - No Value assigned Yet

        let userEmail;



        //Data Type - 2 : Help us To Deal with Multiple Data


        //ARRAY - Store Multiple Data At the Same Time , symbol - [] sqaure bracket
        //Rule : INDEX NO(Position no of Data) STARTS WITH ZERO

        const fruits = ["apple" , "banana" , "mango"]
        console.log(fruits)

        //Access Any Value from Array - ArrayName[Index No]
        console.log(fruits[1])


        //Object - Collection of Properties(Data) Symbol - { } Curly Bracket

        const customer = {
            //key:value pair

            name:"Mike" ,
            age: 35,
            email:"abc@gmail.com",
            city:"Hawai"
        }

        console.log(customer)



    </script>
</body>
</html>
