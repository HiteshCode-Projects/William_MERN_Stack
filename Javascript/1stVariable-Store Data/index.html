    <script>
        //Variable - It is Box In which you store Data
        // Synatx -  Type  VariableName(Box) = Value/Data

        //1.let keyowrd in js - Which Tells Js To Create Variable(Box)

        //Note : Every Text put on qutoes - "Hello" or "bc@gmail.com"

        let username = "Willaim"   //for VALUES that CAN Change

        username  = "Bob"   //This Works

        console.log(username)


        //const keyword - For values that NEVER Change - FIXED , Cannot Update

        const appName = "Whatsapp"

       //  appName = "USA"    //This Will Not Work - you cannot Updated

        console.log(appName)

        //var - OLD Way , avoid This 



        //RULE TO DECIDE VARIABLE TYPE - ALWAYS USE const By Defualt , Only Use 'let' if You KNOW that will Change.
        // Never use var in new code.



    </script>
